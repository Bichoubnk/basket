<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DSEG7+Classic&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball</title>
    <link rel="stylesheet" href="bassketball.css">
    </head>
<body>
    <div class="container">

        <div class="home">
            <h1 id="homeName">HOME </h1>
            <p id="score1">0</p>
            <div class="buttons1">
                <button onclick="homeScore(1)">+1 Point</button>
                <button onclick="homeScore(2)">+2 Points</button>
                <button onclick="homeScore(3)">+3 Points</button>
            </div>    
        </div>
            <button class="reset" onclick="reset()">start another game</button>
        <div class="guest">
            <h1 id="guestName">GUEST</h1>
            <p id="score2">0</p>
            <div class="buttons2">
                <button onclick="guestScore(1)">+1 Point</button>
                <button onclick="guestScore(2)">+2 Points</button>
                <button onclick="guestScore(3)">+3 Points</button>
            </div>
        </div>
    </div> 
    <script src="bassketball.js"></script>  
</body>
</html>
